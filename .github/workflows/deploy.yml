name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_HOST: dsc.rodrigor.com
  DEPLOY_USER: ${{ secrets.SSH_USERNAME || 'eq13' }}

jobs:
  build-and-deploy:
    name: Build, push e deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Configura Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Executa testes
        run: mvn test -B

      - name: Prepara nome da imagem (lowercase)
        id: image
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest" >> "$GITHUB_OUTPUT"

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configura Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.image }}

      - name: Deploy no servidor
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Envia "actor:token" ao servidor. A chave e travada (command=),
          # entao o servidor usa esse token efemero so para puxar a imagem do GHCR.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"
