name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DEPLOY_HOST: dsc.rodrigor.com
  DEPLOY_USER: ghactions
  DEPLOY_PATH: /home/ghactions/eq13
  DATABASE_URL: jdbc:postgresql://postgres:5432/eq13
  DATABASE_USERNAME: eq13
  SERVER_PORT: "8113"

jobs:
  test:
    name: Test and scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn test -B

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: library
          scanners: vuln,secret

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script_stop: true
          script: |
            set -e
            mkdir -p "${{ env.DEPLOY_PATH }}/docker"

      - name: Copy production compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          source: docker/docker-compose.prod.yml
          target: ${{ env.DEPLOY_PATH }}

      - name: Deploy image through SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_FULL: ${{ needs.build-and-push.outputs.image }}:latest
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DATABASE_USERNAME: ${{ env.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          SERVER_PORT: ${{ env.SERVER_PORT }}
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_FULL,DATABASE_URL,DATABASE_USERNAME,DATABASE_PASSWORD,SERVER_PORT
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_DIR="${{ env.DEPLOY_PATH }}"
            COMPOSE_FILE="$DEPLOY_DIR/docker/docker-compose.prod.yml"

            cd "$DEPLOY_DIR"
            umask 077
            touch .env

            set_env() {
              key="$1"
              value="$2"
              tmp="$(mktemp)"
              grep -v "^${key}=" .env > "$tmp" || true
              printf "%s=%s\n" "$key" "$value" >> "$tmp"
              mv "$tmp" .env
            }

            require_env() {
              key="$1"
              if ! grep -Eq "^${key}=.+$" .env; then
                echo "Missing required value in $DEPLOY_DIR/.env: $key"
                exit 1
              fi
            }

            set_env APP_IMAGE "$IMAGE_FULL"
            set_env DATABASE_URL "$DATABASE_URL"
            set_env SERVER_PORT "$SERVER_PORT"

            if [ -n "${DATABASE_USERNAME:-}" ]; then
              set_env DATABASE_USERNAME "$DATABASE_USERNAME"
            fi

            if [ -n "${DATABASE_PASSWORD:-}" ]; then
              set_env DATABASE_PASSWORD "$DATABASE_PASSWORD"
            fi

            require_env DATABASE_USERNAME
            require_env DATABASE_PASSWORD

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            docker compose --env-file "$DEPLOY_DIR/.env" -f "$COMPOSE_FILE" pull app
            docker compose --env-file "$DEPLOY_DIR/.env" -f "$COMPOSE_FILE" up -d postgres

            echo "Waiting for database healthcheck..."
            for attempt in $(seq 1 30); do
              status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' mercado-postgres-prod 2>/dev/null || true)"
              if [ "$status" = "healthy" ]; then
                break
              fi

              if [ "$attempt" -eq 30 ]; then
                echo "Database did not become healthy in time."
                docker logs mercado-postgres-prod --tail 120
                exit 1
              fi

              echo "Database is not ready yet ($attempt/30)."
              sleep 5
            done

            docker compose --env-file "$DEPLOY_DIR/.env" -f "$COMPOSE_FILE" up -d --no-deps --force-recreate app

            APP_PORT="$(grep -E '^SERVER_PORT=' .env | tail -n 1 | cut -d= -f2- || true)"
            APP_PORT="${APP_PORT:-8080}"

            echo "Waiting for application healthcheck on port $APP_PORT..."
            for attempt in $(seq 1 30); do
              if curl -fsS "http://localhost:${APP_PORT}/actuator/health" >/dev/null; then
                echo "Deploy finished successfully."
                docker image prune -f >/dev/null
                exit 0
              fi

              echo "Application is not ready yet ($attempt/30)."
              sleep 5
            done

            echo "Application did not become healthy in time."
            docker logs mercado-app-prod --tail 120
            exit 1
