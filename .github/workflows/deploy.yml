name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DEPLOY_HOST: dsc.rodrigor.com
  DEPLOY_USER: ghactions
  DEPLOY_PATH: /opt/eq13
  DATABASE_URL: jdbc:postgresql://postgres:5432/eq13
  DATABASE_USERNAME: eq13
  SERVER_PORT: "8113"

jobs:
  test:
    name: Test and scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn test -B

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: library
          scanners: vuln,secret

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy image through SSH
        shell: bash
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_FULL: ${{ needs.build-and-push.outputs.image }}:latest
          DEPLOY_HOST: ${{ env.DEPLOY_HOST }}
          DEPLOY_USER: ${{ env.DEPLOY_USER }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DATABASE_USERNAME: ${{ env.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          SERVER_PORT: ${{ env.SERVER_PORT }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/deploy_key docker/docker-compose.prod.yml "$DEPLOY_USER@$DEPLOY_HOST:/tmp/eq13-docker-compose.yml"

          remote_env="$(
            printf 'GHCR_TOKEN=%q GHCR_USER=%q IMAGE_FULL=%q DEPLOY_PATH=%q DATABASE_URL=%q DATABASE_USERNAME=%q DATABASE_PASSWORD=%q SERVER_PORT=%q ' \
              "$GHCR_TOKEN" "$GHCR_USER" "$IMAGE_FULL" "$DEPLOY_PATH" "$DATABASE_URL" "$DATABASE_USERNAME" "$DATABASE_PASSWORD" "$SERVER_PORT"
          )"

          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "${remote_env}bash -s" <<'REMOTE'
          set -euo pipefail

          COMPOSE_FILE="/tmp/eq13-docker-compose.yml"
          DEPLOY_ENV_FILE="$DEPLOY_PATH/deploy.env"

          umask 077
          cat > "$DEPLOY_ENV_FILE" <<EOF
          APP_IMAGE=$IMAGE_FULL
          DATABASE_URL=$DATABASE_URL
          DATABASE_USERNAME=$DATABASE_USERNAME
          DATABASE_PASSWORD=$DATABASE_PASSWORD
          SERVER_PORT=$SERVER_PORT
          EOF

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          compose() {
            env \
              -u COMPOSE_ENV_FILES \
              -u COMPOSE_FILE \
              -u COMPOSE_PROJECT_NAME \
              COMPOSE_DISABLE_ENV_FILE=true \
              docker compose \
                --project-directory /tmp \
                --project-name eq13 \
                --env-file "$DEPLOY_ENV_FILE" \
                -f "$COMPOSE_FILE" \
                "$@"
          }

          cd /tmp
          compose pull app
          compose up -d postgres

          echo "Waiting for database healthcheck..."
          for attempt in $(seq 1 30); do
            status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' mercado-postgres-prod 2>/dev/null || true)"
            if [ "$status" = "healthy" ]; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "Database did not become healthy in time."
              docker logs mercado-postgres-prod --tail 120
              exit 1
            fi

            echo "Database is not ready yet ($attempt/30)."
            sleep 5
          done

          compose up -d --no-deps --force-recreate app

          echo "Waiting for application healthcheck on port $SERVER_PORT..."
          for attempt in $(seq 1 30); do
            if curl -fsS "http://localhost:${SERVER_PORT}/actuator/health" >/dev/null; then
              echo "Deploy finished successfully."
              docker image prune -f >/dev/null
              exit 0
            fi

            echo "Application is not ready yet ($attempt/30)."
            sleep 5
          done

          echo "Application did not become healthy in time."
          docker logs mercado-app-prod --tail 120
          exit 1
          REMOTE
