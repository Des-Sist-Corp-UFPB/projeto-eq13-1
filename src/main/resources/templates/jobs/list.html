<!DOCTYPE html>
<html th:replace="~{fragments/layout :: shell('Vagas', ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<main class="section container">
    <div class="actions" style="justify-content: space-between;">
        <div>
            <span class="eyebrow">RadarTech PB</span>
            <h1 style="margin-bottom: 6px;">Vagas reais de TI</h1>
            <p class="muted">Remotas para todo o Brasil. Hibridas e presenciais somente na Paraiba.</p>
        </div>
        <a class="btn primary" th:href="@{/divulgar}">Divulgar vaga</a>
    </div>

    <form class="filter-bar" th:action="@{/vagas}" method="get">
        <input class="input" type="search" name="q" placeholder="Buscar por cargo, empresa ou stack" th:value="${q}">
        <select class="select" name="location">
            <option value="">Todos os modelos</option>
            <option th:each="type : ${locationTypes}" th:value="${type.name()}" th:selected="${selectedLocation == type.name()}" th:text="${type.label}"></option>
        </select>
        <button class="btn primary" type="submit">Filtrar</button>
    </form>

    <div class="grid" th:if="${#lists.isEmpty(jobs)}">
        <div class="panel"><p class="muted">Nenhuma vaga encontrada com esses filtros.</p></div>
    </div>

    <div class="grid two">
        <article class="job-card" th:each="job : ${jobs}">
            <div class="meta">
                <span class="badge blue" th:text="${job.locationType.label}">Remota</span>
                <span class="badge gray" th:text="${job.seniority.label}">Pleno</span>
                <span class="badge green" th:text="${job.contractType.label}">CLT</span>
            </div>
            <h2 th:text="${job.title}">Titulo</h2>
            <p><strong th:text="${job.company}">Empresa</strong> <span class="muted" th:if="${job.city != null && !job.city.isBlank()}" th:text="|em ${job.city}|"></span></p>
            <p class="muted" th:text="${#strings.abbreviate(job.description, 180)}">Descricao</p>
            <div class="actions">
                <a class="btn primary" th:href="@{/vagas/{id}(id=${job.id})}">Ver detalhes</a>
                <a class="btn" th:if="${job.applyUrl != null && !job.applyUrl.isBlank()}" th:href="${job.applyUrl}" target="_blank" rel="noopener">Abrir vaga</a>
                <span class="muted" th:text="${job.views} + ' visualizacoes'">0 visualizacoes</span>
            </div>
        </article>
    </div>
</main>
</html>
