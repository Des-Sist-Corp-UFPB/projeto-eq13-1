<!DOCTYPE html>
<html th:replace="~{fragments/layout :: shell('Cadastro', ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<main class="login-shell">
    <section class="panel login-card">
        <span class="badge green">Conta gratuita</span>
        <h1>Criar conta</h1>
        <p class="muted">Use sua conta para acompanhar candidaturas internas e acessar sua área pessoal.</p>
        <div class="auth-options">
            <a class="btn google" th:href="@{/oauth2/authorization/google}" aria-label="Cadastrar com Google">
                <svg class="google-logo" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path fill="#4285F4" d="M23.49 12.27c0-.82-.07-1.6-.21-2.36H12v4.46h6.45a5.52 5.52 0 0 1-2.39 3.62v2.96h3.87c2.26-2.08 3.56-5.14 3.56-8.68z"/>
                    <path fill="#34A853" d="M12 24c3.24 0 5.96-1.07 7.94-2.9l-3.87-2.96c-1.07.72-2.44 1.14-4.07 1.14-3.13 0-5.78-2.11-6.72-4.95H1.29v3.06A11.99 11.99 0 0 0 12 24z"/>
                    <path fill="#FBBC05" d="M5.28 14.33a7.2 7.2 0 0 1 0-4.66V6.61H1.29a11.99 11.99 0 0 0 0 10.78l3.99-3.06z"/>
                    <path fill="#EA4335" d="M12 4.72c1.76 0 3.34.6 4.58 1.79l3.44-3.44A11.52 11.52 0 0 0 12 0 11.99 11.99 0 0 0 1.29 6.61l3.99 3.06C6.22 6.83 8.87 4.72 12 4.72z"/>
                </svg>
                <span>Cadastrar com Google</span>
            </a>
        </div>
        <form th:action="@{/cadastro}" th:object="${form}" method="post" class="grid">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="alert" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}">Erro</div>
            <label>Nome
                <input class="input" th:field="*{name}" placeholder="Seu nome">
                <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
            </label>
            <label>E-mail
                <input class="input" th:field="*{email}" placeholder="seu.email@exemplo.com">
                <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </label>
            <label>Usuário
                <input class="input" th:field="*{username}" placeholder="opcional">
                <span class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
            </label>
            <label>Senha
                <input class="input" type="password" th:field="*{password}" placeholder="mínimo de 8 caracteres">
                <span class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </label>
            <button class="btn primary" type="submit">Criar conta</button>
        </form>
        <p class="muted">Já tem conta? <a th:href="@{/login}"><strong>Entrar</strong></a></p>
    </section>
</main>
</html>
