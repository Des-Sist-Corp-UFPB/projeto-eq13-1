<!DOCTYPE html>
<html th:replace="~{fragments/layout :: shell('Admin', ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<main class="login-shell">
    <section class="panel login-card">
        <h1>Admin</h1>
        <p class="muted">Acesse para moderar vagas e acompanhar indicadores.</p>
        <div class="alert" th:if="${param.error}">Credenciais invalidas.</div>
        <div class="alert success" th:if="${param.logout}">Sessao encerrada.</div>
        <form th:action="@{/admin/login}" method="post" class="grid">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>Usuario
                <input class="input" type="text" name="username" autocomplete="username" autofocus>
            </label>
            <label>Senha
                <input class="input" type="password" name="password" autocomplete="current-password">
            </label>
            <button class="btn primary" type="submit">Entrar</button>
        </form>
    </section>
</main>
</html>
