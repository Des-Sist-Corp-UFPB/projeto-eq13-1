<!DOCTYPE html>
<html th:replace="~{fragments/layout :: shell('Nova vaga', ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<main class="section container">
    <th:block th:replace="~{fragments/admin-nav :: adminNav}"></th:block>
    <div class="page-header">
        <div><h1>Nova vaga</h1><p class="muted">Crie uma vaga diretamente como publicada.</p></div>
        <a class="btn" th:href="@{/admin/vagas}">Voltar</a>
    </div>
    <section class="panel">
        <form th:action="@{/admin/vagas/nova}" th:object="${form}" method="post" class="grid">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="alert" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}">Erro</div>
            <div class="grid two">
                <label>Cargo <input class="input" th:field="*{title}"></label>
                <label>Empresa <input class="input" th:field="*{company}"></label>
            </div>
            <label>E-mail da empresa <input class="input" th:field="*{companyEmail}"></label>
            <div class="grid two">
                <label>Modelo
                    <select class="select" th:field="*{locationType}">
                        <option th:each="type : ${locationTypes}" th:value="${type.name()}" th:text="${type.label}"></option>
                    </select>
                </label>
                <label>Cidade <input class="input" th:field="*{city}" placeholder="Obrigatória para híbrida/presencial"></label>
            </div>
            <div class="grid two">
                <label>Senioridade
                    <select class="select" th:field="*{seniority}">
                        <option th:each="item : ${seniorities}" th:value="${item.name()}" th:text="${item.label}"></option>
                    </select>
                </label>
                <label>Contrato
                    <select class="select" th:field="*{contractType}">
                        <option th:each="item : ${contractTypes}" th:value="${item.name()}" th:text="${item.label}"></option>
                    </select>
                </label>
            </div>
            <label>Faixa salarial <input class="input" th:field="*{salaryRange}"></label>
            <label>Descrição <textarea class="textarea" th:field="*{description}"></textarea></label>
            <label>Requisitos <textarea class="textarea" th:field="*{requirements}"></textarea></label>
            <label>Link externo <input class="input" th:field="*{applyUrl}"></label>
            <button class="btn primary" type="submit">Publicar vaga</button>
        </form>
    </section>
</main>
</html>
