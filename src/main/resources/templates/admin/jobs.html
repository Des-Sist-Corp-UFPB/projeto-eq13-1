<!DOCTYPE html>
<html th:replace="~{fragments/layout :: shell('Gestão de vagas', ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<main class="section container">
    <th:block th:replace="~{fragments/admin-nav :: adminNav}"></th:block>
    <div class="page-header">
        <div><h1>Gestão de vagas</h1><p class="muted">Publique, arquive ou remova vagas enviadas.</p></div>
        <a class="btn primary" th:href="@{/admin/vagas/nova}">Nova vaga</a>
    </div>
    <form class="filter-bar" th:action="@{/admin/vagas}" method="get">
        <input class="input" type="search" name="q" placeholder="Cargo ou empresa" th:value="${q}">
        <select class="select" name="status">
            <option value="">Todos os status</option>
            <option th:each="item : ${jobStatuses}" th:value="${item.name()}" th:selected="${selectedStatus == item.name()}" th:text="${item.label}"></option>
        </select>
        <select class="select" name="location">
            <option value="">Todos os modelos</option>
            <option th:each="type : ${locationTypes}" th:value="${type.name()}" th:selected="${selectedLocation == type.name()}" th:text="${type.label}"></option>
        </select>
        <button class="btn primary" type="submit">Filtrar</button>
        <a class="btn ghost" th:href="@{/admin/vagas}">Limpar</a>
    </form>
    <section class="table-panel">
        <table>
            <thead>
            <tr><th>Vaga</th><th>Empresa</th><th>Modelo</th><th>Link</th><th>Status</th><th>Ações</th></tr>
            </thead>
            <tbody>
            <tr th:each="job : ${jobs}">
                <td><strong th:text="${job.title}">Título</strong><br><span class="muted" th:text="|${job.seniority.label} / ${job.contractType.label}|">Nível</span></td>
                <td th:text="${job.company}">Empresa</td>
                <td><span class="badge blue" th:text="${job.locationType.label}">Modelo</span><br><span class="muted" th:text="${job.city}">Cidade</span></td>
                <td><a class="btn small" th:if="${job.applyUrl != null && !job.applyUrl.isBlank()}" th:href="${job.applyUrl}" target="_blank" rel="noopener">Abrir</a><span class="muted" th:if="${job.applyUrl == null || job.applyUrl.isBlank()}">Interna</span></td>
                <td><span class="badge" th:text="${job.status.label}">Status</span></td>
                <td>
                    <div class="inline-actions">
                        <form th:action="@{/admin/vagas/{id}/publicar(id=${job.id})}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="btn small success" type="submit">Publicar</button></form>
                        <form th:action="@{/admin/vagas/{id}/pendente(id=${job.id})}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="btn small" type="submit">Pendente</button></form>
                        <form th:action="@{/admin/vagas/{id}/arquivar(id=${job.id})}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="btn small" type="submit">Arquivar</button></form>
                        <form th:action="@{/admin/vagas/{id}/remover(id=${job.id})}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="btn small danger" type="submit">Remover</button></form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</html>
