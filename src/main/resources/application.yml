spring:
  application:
    name: radartech-pb
  profiles:
    default: dev
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:<google-client-id>}
            client-secret: ${GOOGLE_CLIENT_SECRET:<google-client-secret>}
            scope:
              - openid
              - profile
              - email

stripe:
  secret-key: ${STRIPE_SECRET_KEY:<stripe-secret-key>}
  monthly-price-id: ${STRIPE_MONTHLY_PRICE_ID:<stripe-monthly-price-id>}
  success-url: ${STRIPE_SUCCESS_URL:http://localhost:8080/admin/billing/sucesso}
  cancel-url: ${STRIPE_CANCEL_URL:http://localhost:8080/admin/billing/cancelado}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
