spring:
  application:
    name: radartech-pb
  profiles:
    default: dev
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:<google-client-id>}
            client-secret: ${GOOGLE_CLIENT_SECRET:<google-client-secret>}
            scope:
              - openid
              - profile
              - email

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
