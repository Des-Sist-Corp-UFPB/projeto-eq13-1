services:
  app:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    container_name: eq13-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/eq13}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-eq13}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:-5}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-http://minio:9000}
      AWS_S3_PUBLIC_ENDPOINT: ${AWS_S3_PUBLIC_ENDPOINT:-https://s3.dsc.rodrigor.com}
      AWS_S3_REGION: ${AWS_S3_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-eq13}
      AWS_S3_ACCESS_KEY: ${AWS_S3_ACCESS_KEY:-}
      AWS_S3_SECRET_KEY: ${AWS_S3_SECRET_KEY:?AWS_S3_SECRET_KEY is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-<google-client-id>}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-<google-client-secret>}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://eq13.dsc.rodrigor.com/login/oauth2/code/google}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_MONTHLY_PRICE_ID: ${STRIPE_MONTHLY_PRICE_ID:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-https://eq13.dsc.rodrigor.com/admin/billing/sucesso}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-https://eq13.dsc.rodrigor.com/admin/billing/cancelado}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
    ports:
      - "127.0.0.1:${SERVER_PORT:-8113}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ping >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
