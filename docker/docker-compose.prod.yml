# Docker Compose - producao
#
# Este compose sobe apenas a aplicacao da equipe. O PostgreSQL e o MinIO sao
# servicos compartilhados da infraestrutura DSC e ficam acessiveis pelos hosts:
#   postgres:5432
#   minio:9000
#
# Segredos devem ficar no .env do servidor ou em GitHub Secrets, nunca neste
# arquivo versionado.

services:
  app:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    container_name: eq13-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-${DATABASE_URL:-jdbc:postgresql://postgres:5432/eq13}}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-${DATABASE_USERNAME:-eq13}}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-${DATABASE_PASSWORD:?SPRING_DATASOURCE_PASSWORD or DATABASE_PASSWORD is required}}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:-5}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-http://minio:9000}
      AWS_S3_PUBLIC_ENDPOINT: ${AWS_S3_PUBLIC_ENDPOINT:-https://s3.dsc.rodrigor.com}
      AWS_S3_REGION: ${AWS_S3_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-eq13}
      AWS_S3_ACCESS_KEY: ${AWS_S3_ACCESS_KEY:-eq13}
      AWS_S3_SECRET_KEY: ${AWS_S3_SECRET_KEY:-}
      MINIO_SECRET: ${MINIO_SECRET:-}
    ports:
      - "127.0.0.1:${SERVER_PORT:-8113}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ping >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
