# Docker Compose - producao
#
# A imagem da aplicacao e publicada pelo GitHub Actions no GHCR.
# No servidor, o GitHub Actions gera /opt/eq13/deploy.env com:
#
#   APP_IMAGE=ghcr.io/usuario/repositorio:latest
#   DATABASE_URL=jdbc:postgresql://postgres:5432/eq13
#   DATABASE_USERNAME=eq13
#   DATABASE_PASSWORD=<senha-do-banco>
#   SERVER_PORT=8113

services:
  postgres:
    image: postgres:16-alpine
    container_name: mercado-postgres-prod
    environment:
      POSTGRES_DB: eq13
      POSTGRES_USER: ${DATABASE_USERNAME:?DATABASE_USERNAME is required}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - mercado-net

  app:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    container_name: mercado-app-prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/eq13}
      DATABASE_USERNAME: ${DATABASE_USERNAME:?DATABASE_USERNAME is required}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
    ports:
      - "127.0.0.1:${SERVER_PORT:-8113}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - mercado-net

volumes:
  postgres-prod-data:

networks:
  mercado-net:
    driver: bridge
