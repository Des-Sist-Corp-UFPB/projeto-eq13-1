services:
  postgres:
    image: postgres:16-alpine
    container_name: jobhub-postgres-dev
    environment:
      POSTGRES_DB: jobhub_dev
      POSTGRES_USER: jobhub
      POSTGRES_PASSWORD: jobhub123
    ports:
      - "5432:5432"
    volumes:
      - jobhub-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobhub -d jobhub_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  jobhub-dev-data:
